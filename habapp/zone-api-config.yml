system:
  activity-times:
    wakeup: '6:45 - 9'
    lunch: '12:00 - 13:30'
    quiet: '20:00 - 22:59'
    dinner: '18:20 - 20:00'
    sleep: '23:00 - 7:00'
    auto-arm-stay: '19:30 - 4:00'
    turn-off-plugs: '23:00 - 2:00'

  email-service:
    # See https://howtweaks.com/how-to-set-up-and-use-gmail-smtp-for-email-sending/
    smtp-server: smtp.gmail.com
    port: 465
    sender-email: noop@gmail.com
    sender-password: 'asdf'

  alerts:
    email:
      owner-email-addresses:
        - owner.gmail.com
      admin-email-addresses:
        - admin@gmail.com

  label-mappings:
    owner1: Owner1
    owner2: Owner2
    owner3: Owner3
    owner4: Owner4
    owner5: Owner5
    owner6: Owner6

# Contains the parameters for each named actions.
action-parameters:
  AlertOnBadComputerStates:
    maxCpuTemperatureInDegree: 60
    intervalBetweenAlertsInMinutes: 60
    disabled: false

  AlertOnHumidityOutOfRange:
    notificationAudiences: 'administrators'

  AlertOnHighGasLevel:
    notificationAudiences: 'administrators'

  AlertOnInactiveDevices:
    notificationAudiences: 'administrators'

  AlertOnLowBatteryLevel:
    notificationAudiences: 'administrators'
